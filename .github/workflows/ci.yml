name: CI — Тесты и проверка Docker

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Линтинг (быстро, до запуска тестов)
  # ─────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: src/requirements.txt

      - name: Install dependencies
        run: pip install -r src/requirements.txt flake8

      - name: Flake8
        run: flake8 src/backend --max-line-length=120 --exclude=__pycache__,migrations

  # ─────────────────────────────────────────────
  # JOB 2: Python-тесты с покрытием
  # ─────────────────────────────────────────────
  test:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: src/requirements.txt

      - name: Install dependencies
        run: pip install -r src/requirements.txt

      # init_db.py закомментирован — инициализация встроена в app.py;
      # оставляем шаг с комментарием, чтобы было легко вернуть
      # - name: Init test database
      #   working-directory: src/backend
      #   run: |
      #     python scripts/init_db.py
      #     python scripts/load_csv_data.py

      - name: Run tests with coverage
        working-directory: src
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          FLASK_ENV: development
        run: |
          pytest backend/tests/ -v --cov=backend --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()   # загружаем даже при падении тестов
        with:
          name: coverage-report
          path: src/coverage.xml

  # ─────────────────────────────────────────────
  # JOB 3: Сборка Docker-образа
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: careforme:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — контейнер запускается и отвечает
        run: |
          docker run --rm -d \
            --name careforme_smoke \
            -p 5000:5000 \
            -e SECRET_KEY=ci-smoke-secret \
            -e FLASK_ENV=production \
            careforme:ci-test

          # Ждём старт (healthcheck start_period = 20s, даём 30)
          echo "Waiting for app to start..."
          for i in $(seq 1 12); do
            sleep 5
            if curl -sf http://localhost:5000/ > /dev/null 2>&1; then
              echo "App is up!"
              break
            fi
            echo "Attempt $i/12..."
          done

          # Финальная проверка
          curl -sf http://localhost:5000/ || (docker logs careforme_smoke && exit 1)
          docker stop careforme_smoke

      - name: Verify .dockerignore excludes secrets
        run: |
          # Убеждаемся, что .env не попал в образ
          if docker run --rm careforme:ci-test sh -c "[ -f /app/.env ]"; then
            echo "ERROR: .env file found in image!"
            exit 1
          fi
          echo "OK: .env not in image"
