name: CI — Тесты и проверка Docker

on:
  push:
    branches:
      - main
      - develop
      - second_version_frontend
      - devops
  pull_request:
    branches:
      - main
      - develop
      - second_version_frontend
      - devops

jobs:
  test:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            src/backend/requirements.txt
            src/backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/backend/requirements.txt
          if [ -f src/backend/requirements-dev.txt ]; then pip install -r src/backend/requirements-dev.txt; fi

      - name: Run API tests
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          FLASK_ENV: development
        run: |
          python -m pytest src/tests_api -v

      - name: Run service tests
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          FLASK_ENV: development
        run: |
          python -m pytest src/tests_db -v

      - name: Run all tests with coverage
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          FLASK_ENV: development
        run: |
          python -m pytest src/tests_api src/tests_db --cov=src/backend --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: careforme:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify .dockerignore excludes secrets
        run: |
          if docker run --rm careforme:ci-test sh -c "[ -f /app/.env ]"; then
            echo "ERROR: .env file found in image!"
            exit 1
          fi
          echo "OK: .env not in image"