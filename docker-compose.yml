services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: careforme:local
    container_name: careforme_app
    expose:
      - "5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
    volumes:
      # Монтируем в ПАПКУ, но app.py ищет файл по конкретному пути
      # Решение: создать симлинк внутри контейнера
      - careforme_data:/app/backend/persistent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # Добавляем entrypoint с созданием симлинка
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /app/backend/persistent
        if [ ! -f /app/backend/persistent/careforme.db ]; then
          touch /app/backend/persistent/careforme.db
        fi
        ln -sf /app/backend/persistent/careforme.db /app/backend/careforme.db
        exec ./docker-entrypoint.sh

  nginx:
    image: nginx:1.25-alpine
    container_name: careforme_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  backup:
    image: alpine:3.19
    container_name: careforme_backup
    volumes:
      - careforme_data:/app/backend/persistent:ro
      - careforme_backups:/backups
    environment:
      - KEEP_DAYS=${KEEP_DAYS:-7}
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        printf '#!/bin/sh\ncp /app/backend/persistent/careforme.db /backups/careforme_$$(date +%%Y-%%m-%%d_%%H-%%M-%%S).db\nfind /backups -name "careforme_*.db" -mtime +'"$$KEEP_DAYS"' -delete\necho "[backup] done at $$(date)"\n' > /usr/local/bin/do_backup.sh
        chmod +x /usr/local/bin/do_backup.sh
        echo "0 3 * * * /usr/local/bin/do_backup.sh >> /backups/backup.log 2>&1" > /etc/crontabs/root
        crond -f -l 8

volumes:
  careforme_data:
    driver: local
  careforme_backups:
    driver: local