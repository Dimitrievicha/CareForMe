<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | Care For Me</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="preload" href="music/song.mp3" as="fetch" type="audio/mpeg">
    <script src="js/music.js"></script>
</head>
<body>
    <div class="room-bg" style="background-image: url('images/auth/комната размытая.png');"></div>

    <div class="game-title">
        <img src="images/auth/логотип.png" alt="Care For Me">
    </div>

    <div class="register-window" style="background-image: url('images/auth/окно регистрации.png');">
        <div class="window-content">
            <form id="registerForm">
                <div class="input-field username-field">
                    <input type="text" id="username" placeholder="Имя пользователя" autocomplete="off">
                    <div class="error-message" id="usernameError"></div>
                </div>

                <div class="input-field password-field">
                    <input type="password" id="password" placeholder="Пароль">
                    <div class="error-message" id="passwordError"></div>
                </div>

                <button type="submit" id="submitBtn" style="background-image: url('images/button/продолжить.png');">
                </button>
            </form>
        </div>
    </div>

    <div class="notification-stack" id="notificationStack" aria-live="polite"></div>

    <script src="js/auth.js"></script>
</body>
</html>
