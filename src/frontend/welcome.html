<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добро пожаловать | Care For Me</title>
    <link rel="stylesheet" href="css/welcome.css">
</head>
<body>
    <div class="room-bg" style="background-image: url('images/room.jpg');"></div>

    <div class="welcome-container">
        <div class="welcome-card" style="background-image: url('images/window.png');">
            <div class="card-content">
                <div class="icon-large">🌱</div>
                <h1 id="welcomeMessage">Добро пожаловать в мир растений</h1>

                <div class="flower-animation">
                    <span class="flower">🌸</span>
                    <span class="flower">🌿</span>
                    <span class="flower">🌵</span>
                    <span class="flower">🌻</span>
                </div>

                <button id="continueBtn" style="background-image: url('images/button.png');">
                    <span>Войти в сад</span>
                    <span class="arrow">→</span>
                </button>
            </div>
        </div>
    </div>

    <div class="confetti"></div>

    <script src="js/welcome.js"></script>
</body>
</html>
